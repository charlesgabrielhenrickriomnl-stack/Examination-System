<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" th:href="@{/images/EAC_Emblem.png}" href="/images/EAC_Emblem.png">
    <link rel="shortcut icon" type="image/png" th:href="@{/images/EAC_Emblem.png}" href="/images/EAC_Emblem.png"><title th:text="${subject.subjectName} + ' - Enrolled Students'">Enrolled Students</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/teacher-dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/subject-classroom.css}">
</head>
<body class="teacher-dashboard-page teacher-wide-page subject-classroom-page">
<div class="teacher-layout">
    <div th:replace="~{teacher-nav :: teacherNav}"></div>

    <div class="teacher-content-wrapper">
        <div class="main-container">
            <div class="page-toolbar mb-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
                <a th:href="@{/teacher/subject-classroom/{id}(id=${subject.id})}" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Back to Classroom
                </a>
                <span class="badge bg-light text-dark border" th:text="${enrolledCount} + ' Enrolled Students'">0 Enrolled Students</span>
            </div>

            <div class="section-card">
                <div class="section-head d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                    <div class="section-title mb-0">
                        <i class="bi bi-people-fill"></i>
                        <span th:text="${subject.subjectName} + ' - Enrolled Students'">Enrolled Students</span>
                    </div>
                    <input type="text" id="enrolledStudentSearch" class="form-control form-control-sm"
                           placeholder="Search student name or email..." style="max-width:280px;">
                </div>

                <div th:if="${#lists.isEmpty(enrolledStudents)}" class="empty-state">
                    <i class="bi bi-inbox"></i>
                    <p class="mb-1 fw-semibold small">No students enrolled yet.</p>
                    <small class="text-muted">Go back to classroom and click "Enroll Students" to add students.</small>
                </div>

                <div th:if="${!#lists.isEmpty(enrolledStudents)}" class="table-responsive">
                    <table class="student-list-table" id="enrolledStudentsTable">
                        <thead>
                        <tr>
                            <th>Student</th>
                            <th>Email</th>
                            <th>Program</th>
                            <th>Enrolled</th>
                            <th style="width:80px;">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="student : ${enrolledStudents}"
                            th:with="studentName=${student.studentName != null ? student.studentName : ''},
                                     studentEmail=${student.studentEmail != null ? student.studentEmail : ''},
                                     program=${studentProgramByEmail != null ? studentProgramByEmail[#strings.toLowerCase(studentEmail)] : ''}"
                            th:attr="data-search-key=${#strings.toLowerCase(studentName) + ' ' + #strings.toLowerCase(studentEmail) + ' ' + #strings.toLowerCase(program != null ? program : '')}">
                            <td><span class="fw-semibold" th:text="${!#strings.isEmpty(studentName) ? studentName : '-'}">Name</span></td>
                            <td class="text-muted" th:text="${!#strings.isEmpty(studentEmail) ? studentEmail : '-'}">email</td>
                            <td class="text-muted" th:text="${program != null && !#strings.isEmpty(program) ? program : '-'}">-</td>
                            <td class="text-muted small"
                                th:text="${student.enrolledAt != null ? #temporals.format(student.enrolledAt, 'MMM dd, yyyy') : '-'}">Date</td>
                            <td>
                                <form th:action="@{/teacher/remove-student}" method="post" style="display:inline;">
                                    <input type="hidden" name="enrollmentId" th:value="${student.id}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Remove this student from the classroom?')">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/subject-enrolled-students.js}"></script>
</body>
</html>
