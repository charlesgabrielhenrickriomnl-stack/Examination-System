<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" th:href="@{/images/EAC_Emblem.png}" href="/images/EAC_Emblem.png">
    <link rel="shortcut icon" type="image/png" th:href="@{/images/EAC_Emblem.png}" href="/images/EAC_Emblem.png"><title>Department Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="stylesheet" th:href="@{/css/department-admin-dashboard.css}">
</head>
<body class="homepage-page department-dashboard-page">
<div class="teacher-layout">
    <div th:replace="~{department-admin-nav :: departmentAdminNav}"></div>

    <div class="teacher-content-wrapper">
        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                <div>
                    <h3 class="fw-bold mb-1" style="color:#7a1022;">
                        <i class="bi bi-shield-check me-2"></i>Department Admin Dashboard
                    </h3>
                    <p class="text-muted mb-0" th:text="${departmentName}">Department</p>
                </div>
            </div>

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${successMessage}">Success</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${errorMessage}">Error</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body text-center">
                            <div class="h3 mb-1" th:text="${departmentTeacherCount}">0</div>
                            <div class="text-muted small">Teachers</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body text-center">
                            <div class="h3 mb-1" th:text="${departmentSubjectCount}">0</div>
                            <div class="text-muted small">Subjects</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body text-center">
                            <div class="h3 mb-1" th:text="${departmentQuestionCount}">0</div>
                            <div class="text-muted small">Question Bank Items</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header fw-semibold">Department Subjects</div>
                <div class="card-body p-0">
                    <div class="p-3 border-bottom" th:if="${departmentCards != null && !departmentCards.isEmpty()}">
                        <div class="row g-3">
                            <div class="col-12 col-md-6 col-xl-4"
                                   th:each="departmentCard,departmentStat : ${departmentCards}"
                                   th:with="department=${departmentCard.departmentName},programs=${departmentCard.programs}">
                                <div class="card department-card h-100">
                                    <div class="department-card-header fw-semibold">
                                        <i class="bi bi-building me-1"></i>
                                        <span th:text="${departmentCard.departmentName}">Department</span>
                                    </div>
                                    <div class="card-body">
                                        <div class="small mb-2">
                                            <span class="badge bg-light text-dark border me-1" th:text="${departmentCard.teacherCount} + ' teacher(s)'">0 teacher(s)</span>
                                            <span class="badge bg-light text-dark border me-1" th:text="${departmentCard.studentCount} + ' student(s)'">0 student(s)</span>
                                            <span class="badge bg-light text-dark border" th:text="${departmentCard.questionCount} + ' question(s)'">0 question(s)</span>
                                        </div>
                                        <div class="small text-muted mb-2">
                                            <span th:text="${programs != null ? #lists.size(programs) : 0}">0</span>
                                            <span> program(s)</span>
                                        </div>
                                        <div class="small text-muted" th:if="${programs == null || programs.isEmpty()}">No programs configured.</div>
                                        <div class="small" th:if="${programs != null && !programs.isEmpty()}">
                                            <span class="badge bg-light text-dark border me-1 mb-1"
                                                  th:each="program,programStat : ${programs}"
                                                  th:if="${programStat.index < 3}"
                                                  th:text="${program}">Program</span>
                                            <span class="text-muted" th:if="${#lists.size(programs) > 3}"
                                                  th:text="${'+ ' + (#lists.size(programs) - 3) + ' more'}">+ more</span>
                                        </div>

                                        <div class="department-card-actions">
                                            <a class="btn btn-sm btn-outline-dark"
                                               th:href="@{/department-admin/department-view(departmentName=${department})}">
                                                <i class="bi bi-people me-1"></i>View Department
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
