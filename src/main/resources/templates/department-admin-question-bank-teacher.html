<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" th:href="@{/images/EAC_Emblem.png}" href="/images/EAC_Emblem.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" type="image/png" th:href="@{/images/EAC_Emblem.png}" href="/images/EAC_Emblem.png">
    <title>Teacher Overview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/teacher-dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/department-admin-dashboard.css}">
</head>
<body class="teacher-dashboard-page department-dashboard-page">
<div class="teacher-layout">
    <div th:replace="~{department-admin-nav :: departmentAdminNav}"></div>

    <div class="teacher-content-wrapper">
        <div class="container py-4">
            <div class="department-program-banner mb-3">
                <div class="department-program-banner-main">
                    <h3 class="department-page-title mb-1">
                        <span class="department-title-icon department-title-icon-lg"><i class="bi bi-person-lines-fill"></i></span>
                        <span th:text="${selectedTeacherName}">Teacher Name</span>
                    </h3>
                    <p class="department-page-subtitle mb-0" th:text="${selectedTeacherEmail + ' • ' + selectedProgram}">teacher@email.com</p>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <a class="btn btn-sm department-btn-outline"
                       th:href="@{/department-admin/question-bank(page=${page},size=${size},search=${search},departmentName=${selectedDepartment},programName=${selectedProgram},subject=${selectedSubject},teacherSearch=${teacherSearch},teacherPage=${teacherPage},teacherSize=${teacherSize})}">
                        <i class="bi bi-arrow-left me-1"></i> Back to Program Quiz List
                    </a>
                </div>
            </div>

            <div class="row g-3 align-items-stretch">
                <div class="col-12 col-xl-6">
                    <div class="card department-panel-card department-teacher-detail-card h-100">
                        <div class="card-header d-flex justify-content-between align-items-center department-panel-header">
                            <span class="fw-semibold"><i class="bi bi-people me-2"></i>Enrolled Students</span>
                            <small class="text-muted" th:text="${enrolledStudents != null ? enrolledStudents.size() : 0} + ' student(s)'">0 student(s)</small>
                        </div>
                        <div class="card-body p-2 d-flex flex-column">
                            <form method="get" th:action="@{/department-admin/question-bank/teacher}" class="department-teacher-search-form mb-2">
                                <input type="hidden" name="departmentName" th:value="${selectedDepartment}">
                                <input type="hidden" name="programName" th:value="${selectedProgram}">
                                <input type="hidden" name="teacherEmail" th:value="${selectedTeacherEmail}">
                                <input type="hidden" name="subject" th:value="${selectedSubject}">
                                <input type="hidden" name="search" th:value="${search}">
                                <input type="hidden" name="teacherSearch" th:value="${teacherSearch}">
                                <input type="hidden" name="teacherPage" th:value="${teacherPage}">
                                <input type="hidden" name="teacherSize" th:value="${teacherSize}">
                                <input type="hidden" name="page" th:value="${page}">
                                <input type="hidden" name="size" th:value="${size}">
                                <input type="hidden" name="quizSearch" th:value="${quizSearch}">
                                <input type="text" name="studentSearch" class="form-control form-control-sm" th:value="${studentSearch}" placeholder="Search students by name or email...">
                                <button type="submit" class="btn btn-sm department-btn-outline">Search</button>
                            </form>
                            <div class="department-teacher-detail-scroll">
                            <div class="department-empty-state small" th:if="${enrolledStudents == null || enrolledStudents.isEmpty()}">
                                No students enrolled under this teacher yet.
                            </div>
                            <ul class="department-overview-list" th:if="${enrolledStudents != null && !enrolledStudents.isEmpty()}">
                                <li th:each="student : ${enrolledStudents}">
                                    <span th:text="${student.name}">Student Name</span>
                                    <small class="text-muted" th:text="${student.email}">student@email.com</small>
                                </li>
                            </ul>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-xl-6">
                    <div class="card department-panel-card department-teacher-detail-card h-100">
                        <div class="card-header d-flex justify-content-between align-items-center department-panel-header">
                            <span class="fw-semibold"><i class="bi bi-journal-richtext me-2"></i>Quizzes Given</span>
                            <small class="text-muted" th:text="${teacherQuizzes != null ? teacherQuizzes.size() : 0} + ' quiz(es)'">0 quiz(es)</small>
                        </div>
                        <div class="card-body p-2 d-flex flex-column">
                            <form method="get" th:action="@{/department-admin/question-bank/teacher}" class="department-teacher-search-form mb-2">
                                <input type="hidden" name="departmentName" th:value="${selectedDepartment}">
                                <input type="hidden" name="programName" th:value="${selectedProgram}">
                                <input type="hidden" name="teacherEmail" th:value="${selectedTeacherEmail}">
                                <input type="hidden" name="subject" th:value="${selectedSubject}">
                                <input type="hidden" name="search" th:value="${search}">
                                <input type="hidden" name="teacherSearch" th:value="${teacherSearch}">
                                <input type="hidden" name="teacherPage" th:value="${teacherPage}">
                                <input type="hidden" name="teacherSize" th:value="${teacherSize}">
                                <input type="hidden" name="page" th:value="${page}">
                                <input type="hidden" name="size" th:value="${size}">
                                <input type="hidden" name="studentSearch" th:value="${studentSearch}">
                                <input type="text" name="quizSearch" class="form-control form-control-sm" th:value="${quizSearch}" placeholder="Search quizzes by name or subject...">
                                <button type="submit" class="btn btn-sm department-btn-outline">Search</button>
                            </form>

                            <div class="department-teacher-detail-scroll">
                                <div class="department-empty-state small" th:if="${teacherQuizzes == null || teacherQuizzes.isEmpty()}">
                                    No quizzes uploaded by this teacher yet.
                                </div>
                                <div class="department-quiz-list" th:if="${teacherQuizzes != null && !teacherQuizzes.isEmpty()}">
                                    <div class="department-quiz-item" th:each="quiz : ${teacherQuizzes}">
                                        <div>
                                            <p class="department-quiz-item-title mb-1" th:text="${quiz.sourceExamName}">Quiz Name</p>
                                            <div class="department-quiz-item-meta">
                                                <span class="department-pill"><i class="bi bi-journal-text"></i><span th:text="${quiz.subject != null && !#strings.isEmpty(quiz.subject) ? quiz.subject : '-'}">Subject</span></span>
                                                <span class="department-pill"><i class="bi bi-collection"></i><span th:text="${quiz.questionCount} + ' item(s)'">0 item(s)</span></span>
                                            </div>
                                        </div>
                                        <a class="btn btn-sm department-btn-outline"
                                           th:href="@{/department-admin/question-bank/quiz(page=${page},size=${size},search=${search},departmentName=${selectedDepartment},programName=${selectedProgram},subject=${selectedSubject},sourceExamId=${quiz.sourceExamId},sourceExamName=${quiz.sourceExamName})}">
                                            <i class="bi bi-eye me-1"></i>View Quiz
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
