<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" th:href="@{/images/EAC_Emblem.png}" href="/images/EAC_Emblem.png">
    <link rel="shortcut icon" type="image/png" th:href="@{/images/EAC_Emblem.png}" href="/images/EAC_Emblem.png">
    <title>Exam OTP Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/teacher-dashboard.css}">
</head>
<body class="teacher-dashboard-page student-dashboard-page">
<div class="teacher-layout">
    <div th:replace="~{student-nav :: studentNav}"></div>

    <div class="teacher-content-wrapper">
        <div class="container py-4" style="max-width: 860px;">
            <div class="mb-3">
                <a th:href="${classroomUrl}" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Back to Classroom
                </a>
            </div>

            <div class="card shadow-sm border-0" style="border-radius: 16px; overflow: hidden;">
                <div class="card-header text-white" style="background: linear-gradient(135deg, #7a1022, #4f0c18);">
                    <h4 class="mb-1 fw-bold"><i class="bi bi-shield-lock me-2"></i>Teacher OTP Verification</h4>
                    <p class="mb-0 opacity-75">Ask your teacher for your personal access code before starting this exam.</p>
                </div>
                <div class="card-body p-4">
                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
                    <div th:if="${otpPromptMessage}" class="alert alert-warning" th:text="${otpPromptMessage}"></div>

                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <span class="badge bg-light text-dark border px-3 py-2" th:text="${examName}">Exam Name</span>
                        <span class="badge bg-light text-dark border px-3 py-2" th:text="${activityType}">Quiz</span>
                        <span class="badge bg-light text-dark border px-3 py-2" th:text="${subjectName}">Subject</span>
                        <span class="badge bg-light text-dark border px-3 py-2" th:text="${timeLimit} + ' min'">60 min</span>
                        <span class="badge bg-warning-subtle text-dark border px-3 py-2"
                              th:if="${deadline != null && !#strings.isEmpty(deadline)}"
                              th:text="'Due: ' + ${deadline}">Due</span>
                        <span class="badge bg-info-subtle text-dark border px-3 py-2"
                              th:if="${otpExpiresAt != null && !#strings.isEmpty(otpExpiresAt)}"
                              th:text="'OTP valid until: ' + ${otpExpiresAt}">OTP</span>
                    </div>

                    <form th:action="@{/student/take-exam/{id}/verify-otp(id=${distributedExamId})}" method="post" class="row g-3 align-items-end">
                        <div class="col-12 col-md-8">
                            <label for="otpCode" class="form-label fw-semibold">Enter OTP Code</label>
                            <input type="text"
                                   id="otpCode"
                                   name="otpCode"
                                   class="form-control form-control-lg"
                                   maxlength="10"
                                   placeholder="Enter code from teacher"
                                   autocomplete="one-time-code"
                                   required>
                            <div class="form-text">Each OTP is unique per student. Do not share your code with classmates.</div>
                        </div>
                        <div class="col-12 col-md-4 d-grid">
                            <button type="submit" class="btn btn-lg btn-danger">
                                <i class="bi bi-check2-circle me-1"></i>Verify and Start
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
