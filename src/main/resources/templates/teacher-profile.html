<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" th:href="@{/images/EAC_Emblem.png}" href="/images/EAC_Emblem.png">
    <link rel="shortcut icon" type="image/png" th:href="@{/images/EAC_Emblem.png}" href="/images/EAC_Emblem.png"><title>Account Setting - ALGO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="homepage-page teacher-account-page">

<div class="teacher-layout">
    <div th:replace="~{teacher-nav :: teacherNav}"></div>

    <div class="teacher-content-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8">
                    <div class="card upload-card profile-card">
                        <div class="card-body p-4"> 

                            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                            <div class="profile-info-item">
                                <div class="profile-info-icon"><i class="fa-solid fa-user"></i></div>
                                <div class="profile-info-content">
                                    <div class="profile-info-label">Name</div>
                                    <div class="profile-info-value" th:text="${currentUserFullName ?: 'Teacher'}">Teacher</div>
                                </div>
                            </div>

                            <div class="profile-info-item">
                                <div class="profile-info-icon"><i class="fa-solid fa-envelope"></i></div>
                                <div class="profile-info-content">
                                    <div class="profile-info-label">Email</div>
                                    <div class="profile-info-value" th:text="${currentUserEmail ?: 'N/A'}">N/A</div>
                                </div>
                            </div>

                            <div class="profile-info-item mb-4">
                                <div class="profile-info-icon"><i class="fa-solid fa-user-tag"></i></div>
                                <div class="profile-info-content">
                                    <div class="profile-info-label">Role</div>
                                    <div class="profile-info-value" th:text="${currentUserRole ?: 'TEACHER'}">TEACHER</div>
                                </div>
                            </div>

                            <div class="profile-info-item">
                                <div class="profile-info-icon"><i class="fa-solid fa-school"></i></div>
                                <div class="profile-info-content">
                                    <div class="profile-info-label">School</div>
                                    <div class="profile-info-value" th:text="${currentUserSchool ?: 'Emilio Aguinaldo College'}">Emilio Aguinaldo College</div>
                                </div>
                            </div>

                            <div class="profile-info-item">
                                <div class="profile-info-icon"><i class="fa-solid fa-location-dot"></i></div>
                                <div class="profile-info-content">
                                    <div class="profile-info-label">Campus</div>
                                    <div class="profile-info-value" th:text="${currentUserCampus ?: 'Manila'}">Manila</div>
                                </div>
                            </div>

                            <form th:action="@{/logout}" method="post" class="text-end">
                                <button type="submit" class="btn btn-primary px-4">Logout
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    <link rel="stylesheet" th:href="@{/css/teacher-profile.css}">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
