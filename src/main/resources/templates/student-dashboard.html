<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - ALGO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .student-dashboard-shell {
            max-width: 1860px;
            margin: 0 auto;
        }
        @media (min-width: 1200px) {
            .student-dashboard-shell {
                padding-left: 2.5in !important;
                padding-right: 1.1rem !important;
            }
        }
        .dashboard-left-panel {
            position: sticky;
            top: 102px;
        }
        .dashboard-right-panel {
            min-height: 420px;
        }
        .profile-hero {
            background: linear-gradient(135deg, var(--eac-maroon) 0%, #8f1a2e 100%);
            color: #fff;
            border-radius: 14px;
            padding: 1.4rem 1.5rem;
            margin-bottom: 1rem;
        }
        .profile-avatar {
            width: 64px; height: 64px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.9rem; flex-shrink: 0;
        }
        .stat-card {
            border: 1px solid var(--eac-border);
            border-radius: 12px;
            padding: 1rem 1rem;
            text-align: center;
            transition: box-shadow 0.2s;
            min-height: 112px;
        }
        .stat-card:hover { box-shadow: 0 4px 14px rgba(122,16,34,0.1); }
        .stat-value { font-size: 1.85rem; font-weight: 700; color: var(--eac-maroon); }
        .stat-label { font-size: 0.82rem; color: #666; margin-top: 0.15rem; }
        .hist-thead { background: var(--eac-maroon); color: #fff; }
        .badge-score { font-size: 0.83rem; }
        .subject-chip {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: #f5f0f2; border: 1px solid #e0d0d5;
            border-radius: 30px; padding: 0.3rem 0.85rem;
            font-size: 0.85rem; color: #3a0a10;
        }
        .subject-card {
            border: 1px solid var(--eac-border);
            border-radius: 14px;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }
        .subject-card:hover { box-shadow: 0 8px 24px rgba(122,16,34,0.13); }
        .subject-header {
            background: linear-gradient(135deg, var(--eac-maroon) 0%, #8f1a2e 100%) !important;
        }
        .activity-item { transition: background 0.15s; }
        .activity-item:hover { background: #fdf6f0; }
        .activity-pending { border-left: 3px solid var(--eac-gold) !important; }
        .activity-missed { border-left: 3px solid var(--bs-danger) !important; }
        .activity-item .date-text { color: #555; font-size: 0.78rem; }
        .min-w-0 { min-width: 0; }
        .section-title {
            color: var(--eac-maroon); font-weight: 700;
            border-bottom: 2px solid var(--eac-gold);
            padding-bottom: 0.4rem; margin-bottom: 1.25rem;
        }
        .activity-list {
            max-height: 360px;
            overflow-y: auto;
        }
        .subject-search {
            max-width: 560px;
        }
        .subject-card-col {
            display: flex;
        }
        .subject-card-col .subject-card {
            width: 100%;
        }
        @media (max-width: 1199px) {
            .dashboard-left-panel {
                position: static;
                top: auto;
            }
        }
    </style>
</head>
<body class="homepage-page">

<div class="teacher-layout">
    <div th:replace="~{student-nav :: studentNav}"></div>

    <div class="teacher-content-wrapper">
        <div class="container-fluid student-dashboard-shell px-2 px-lg-3">
            <div class="dashboard-right-panel">
                        <div class="mb-4">
                            <h3 class="section-title"><i class="bi bi-grid-3x3-gap-fill me-2"></i>My Subjects</h3>
                            <p class="text-muted mb-0">
                                <strong th:text="${studentEmail}">student</strong> —
                                view your enrolled subjects and available exams.
                            </p>
                        </div>

                        <div th:if="${hasSubjects}" class="mb-3">
                            <input id="subjectSearch" type="text" class="form-control subject-search"
                                   placeholder="🔎 Search subject name, description, or teacher...">
                        </div>

                        <!-- No Subjects -->
                        <div th:if="${!hasSubjects}" class="text-center py-5">
                            <div class="card upload-card p-5">
                                <i class="bi bi-inbox" style="font-size: 4rem; color: #ccc;"></i>
                                <h5 class="mt-3 text-muted">No Subjects Yet</h5>
                                <p class="text-muted mb-0">You haven't been enrolled in any subjects yet.<br>Contact your teacher to get started.</p>
                            </div>
                        </div>

                        <!-- Subject Cards Grid -->
                        <div th:if="${hasSubjects}" class="row g-3" id="subjectsGrid">
                               <div th:each="subject : ${subjectCards}" class="col-12 col-md-6 col-xl-4 col-xxl-3 subject-card-col"
                                 th:attr="data-search-key=${#strings.toLowerCase(subject.name) + ' ' + #strings.toLowerCase(subject.description != null ? subject.description : '') + ' ' + #strings.toLowerCase(subject.teacherName != null ? subject.teacherName : '')}">
                                <div class="card subject-card shadow-sm h-100">
                                    <!-- Subject Header -->
                                    <div class="card-header subject-header text-white p-4">
                                        <h5 class="card-title mb-1 fw-bold" th:text="${subject.name}">Subject Name</h5>
                                        <small th:if="${subject.description != null && !subject.description.isEmpty()}"
                                               th:text="${subject.description}" class="opacity-75">Description</small>
                                        <small th:unless="${subject.description != null && !subject.description.isEmpty()}" class="opacity-75">
                                            <i class="bi bi-person me-1"></i><span th:text="'TEACHER: ' + ${subject.teacherName}">TEACHER: Name</span>
                                        </small>
                                    </div>
                                    <!-- Activities Section -->
                                    <div class="card-body p-3">
                                        <div th:if="${subject.pendingCount == 0}" class="text-center text-muted py-3">
                                            <i class="bi bi-check2-circle" style="font-size: 1.8rem;"></i>
                                            <p class="mb-0 mt-2 small">No pending activities</p>
                                        </div>

                                        <div th:if="${subject.pendingSummaries != null && !subject.pendingSummaries.isEmpty()}" class="d-flex flex-column gap-2">
                                            <div th:each="pending : ${subject.pendingSummaries}"
                                                 class="d-flex justify-content-between align-items-center border rounded px-3 py-2 bg-light">
                                                <span class="fw-semibold" th:text="${pending.label}">Pending Quiz</span>
                                                <span class="badge bg-warning text-dark" th:text="${pending.count}">0</span>
                                            </div>
                                        </div>

                                        <div th:if="${subject.completedCount != null && subject.completedCount > 0}" class="mt-3">
                                            <small class="text-muted">
                                                <i class="bi bi-check2-square me-1"></i>
                                                Completed activities: <span th:text="${subject.completedCount}">0</span>
                                            </small>
                                        </div>
                                    </div>

                                    <div class="card-footer bg-light text-center">
                                        <a th:href="@{/student/classroom/{id}(id=${subject.id})}" class="btn btn-sm btn-outline-secondary">
                                            <i class="bi bi-door-open me-1"></i>View Classroom
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
            </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const searchInput = document.getElementById('subjectSearch');
        if (!searchInput) return;

        searchInput.addEventListener('input', function () {
            const query = (this.value || '').toLowerCase().trim();
            document.querySelectorAll('.subject-card-col').forEach(card => {
                const key = card.getAttribute('data-search-key') || '';
                card.style.display = (!query || key.includes(query)) ? '' : 'none';
            });
        });
    });
</script>
</body>
</html>
