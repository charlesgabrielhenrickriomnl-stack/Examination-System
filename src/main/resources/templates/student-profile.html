<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ALGO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .profile-shell {
            max-width: 1320px;
            margin: 0 auto;
        }

        .profile-stage {
            background: #fff;
            border: 1px solid var(--eac-border);
            border-radius: 18px;
            box-shadow: 0 12px 28px rgba(60, 36, 13, 0.09);
            padding: 1rem;
        }

        .profile-hero {
            background:
                radial-gradient(circle at 90% 14%, rgba(232, 178, 46, 0.24) 0%, rgba(232, 178, 46, 0) 42%),
                linear-gradient(140deg, #8f1228 0%, #6f0e20 58%, #580915 100%);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 1.2rem 1.25rem;
            margin-bottom: 1rem;
            box-shadow: 0 12px 24px rgba(71, 12, 24, 0.2);
        }

        .profile-kicker {
            margin: 0 0 0.2rem;
            font-size: 0.74rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
            color: rgba(255, 229, 177, 0.95);
        }

        .profile-subtitle {
            margin: 0.45rem 0 0;
            color: rgba(255, 255, 255, 0.82);
            font-size: 0.9rem;
        }

        .profile-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(255,255,255,0.22);
            border: 1px solid rgba(255,255,255,0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
        }

        .profile-role-pill {
            background: rgba(212, 163, 42, 0.94);
            color: #3a0a10;
            border-radius: 999px;
            padding: 0.25rem 0.68rem;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            border: 1px solid rgba(255,255,255,0.35);
        }

        .profile-email {
            margin: 0;
            color: rgba(255,255,255,0.9);
            font-size: 1.05rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .stat-card {
            border: 1px solid var(--eac-border);
            border-radius: 14px;
            padding: 1rem 0.9rem;
            text-align: center;
            min-height: 112px;
            transition: transform 0.18s ease, box-shadow 0.2s;
            background: linear-gradient(180deg, #fff 0%, #fff9f2 100%);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(122,16,34,0.12);
        }

        .stat-value {
            font-size: 1.85rem;
            font-weight: 800;
            color: var(--eac-maroon);
            line-height: 1.05;
            margin-bottom: 0.35rem;
        }

        .stat-label {
            font-size: 0.81rem;
            color: #5d4b3a;
            margin-top: 0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .stat-card.passed .stat-value {
            color: #1f7b49;
        }

        .profile-controls {
            border: 1px solid #eadfce;
            border-radius: 14px;
            background: linear-gradient(180deg, #fff 0%, #fffaf5 100%);
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.65rem;
        }

        .profile-logout-btn {
            border-radius: 10px;
            background: #7a1022;
            border-color: #7a1022;
            font-weight: 700;
            padding: 0.55rem 1.1rem;
            min-width: 160px;
        }

        .profile-logout-btn:hover,
        .profile-logout-btn:focus {
            background: #5f0d1a;
            border-color: #5f0d1a;
            color: #fff;
        }

        @media (max-width: 992px) {
            .profile-stage {
                padding: 0.8rem;
            }

            .profile-hero {
                padding: 1rem;
            }

            .profile-email {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body class="homepage-page">

<div class="teacher-layout">
    <div th:replace="~{student-nav :: studentNav}"></div>

    <div class="teacher-content-wrapper">
        <div class="container profile-shell">
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="profile-stage">
                <div class="profile-hero">
                    <div class="d-flex align-items-center gap-3 flex-wrap">
                        <div class="profile-avatar">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        <div>
                            <p class="profile-kicker">Student Profile</p>
                            <h2 class="mb-1 fw-bold" th:text="${currentUserFullName != null ? currentUserFullName : studentEmail}">Student Name</h2>
                            <p class="profile-email mb-2">
                                <i class="bi bi-envelope"></i>
                                <span th:text="${currentUserEmail != null ? currentUserEmail : studentEmail}">student@email.com</span>
                            </p>
                            <p class="profile-subtitle mb-2" th:if="${currentUserSchool != null || currentUserDepartment != null}">
                                <i class="bi bi-building me-1"></i>
                                <span th:text="${currentUserSchool != null ? currentUserSchool : 'Emilio Aguinaldo College'}">Emilio Aguinaldo College</span>
                                <span th:if="${currentUserCampus != null && !#strings.isEmpty(currentUserCampus)}"
                                      th:text="${' - ' + currentUserCampus}"> - Manila</span>
                            </p>
                            <p class="profile-subtitle mb-2" th:if="${currentUserDepartment != null && !#strings.isEmpty(currentUserDepartment)}">
                                <i class="bi bi-building-check me-1"></i>
                                <span th:text="${currentUserDepartment}">Department</span>
                            </p>
                            <p class="profile-subtitle mb-2" th:if="${currentUserProgram != null && !#strings.isEmpty(currentUserProgram)}">
                                <i class="bi bi-journal-bookmark me-1"></i>
                                <span th:text="${currentUserProgram}">Program</span>
                            </p>
                            <span class="profile-role-pill">
                                <i class="bi bi-mortarboard-fill"></i>
                                Student
                            </span>
                            <p class="profile-subtitle">Track your progress and monitor your exam performance at a glance.</p>
                        </div>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-6 col-md-3">
                        <div class="stat-card attempts">
                            <div class="stat-value" th:text="${totalAttempts}">0</div>
                            <div class="stat-label"><i class="bi bi-file-earmark-text me-1"></i>Exams Taken</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="stat-card avg">
                            <div class="stat-value" th:text="${avgScore + '%'}">0%</div>
                            <div class="stat-label"><i class="bi bi-bar-chart-line me-1"></i>Average Score</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="stat-card passed">
                            <div class="stat-value" th:text="${passedCount}">0</div>
                            <div class="stat-label"><i class="bi bi-check-circle me-1"></i>Passed</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="stat-card best">
                            <div class="stat-value" th:text="${bestScore + '%'}">0%</div>
                            <div class="stat-label"><i class="bi bi-trophy me-1"></i>Best Score</div>
                        </div>
                    </div>
                </div>

                <div class="profile-controls">
                    <div class="mb-3 text-start mx-auto" style="max-width: 520px;">
                        <label class="form-label fw-semibold">Set Department and Program</label>
                        <form th:action="@{/account/update-affiliation}" method="post" class="d-flex gap-2 flex-wrap">
                            <select class="form-select" id="studentDepartmentSelect" name="departmentName" required>
                                <option value="">Select Department</option>
                                <option th:each="department : ${departmentOptions}"
                                        th:value="${department}"
                                        th:text="${department}"
                                        th:selected="${department == currentUserDepartment}"></option>
                            </select>
                            <select class="form-select" id="studentProgramSelect" name="programName">
                                <option value="">Select Program</option>
                            </select>
                            <button type="submit" class="btn btn-outline-primary">Save</button>
                        </form>
                    </div>
                    <form th:action="@{/logout}" method="post" class="d-inline-block">
                        <button type="submit" class="btn btn-primary profile-logout-btn">
                            <i class="bi bi-box-arrow-right me-1"></i> Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    (function () {
        const programsByDepartment = /*[[${programOptionsByDepartment}]]*/ {};
        const currentProgram = /*[[${currentUserProgram}]]*/ '';
        const departmentSelect = document.getElementById('studentDepartmentSelect');
        const programSelect = document.getElementById('studentProgramSelect');
        if (!departmentSelect || !programSelect) {
            return;
        }

        function syncPrograms() {
            const selectedDepartment = departmentSelect.value || '';
            const programs = programsByDepartment[selectedDepartment] || [];
            const previous = programSelect.value || currentProgram || '';

            programSelect.innerHTML = '<option value="">Select Program</option>';
            programs.forEach(program => {
                const option = document.createElement('option');
                option.value = program;
                option.textContent = program;
                programSelect.appendChild(option);
            });

            if (previous && programs.includes(previous)) {
                programSelect.value = previous;
            }
            programSelect.required = programs.length > 0;
        }

        departmentSelect.addEventListener('change', syncPrograms);
        syncPrograms();
    })();
</script>
</body>
</html>
