<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ALGO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .profile-shell {
            max-width: 1200px;
            margin: 0 auto;
        }

        .profile-hero {
            background: linear-gradient(135deg, var(--eac-maroon) 0%, #8f1a2e 100%);
            color: #fff;
            border-radius: 14px;
            padding: 1.4rem 1.5rem;
            margin-bottom: 1rem;
        }

        .profile-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.9rem;
            flex-shrink: 0;
        }

        .stat-card {
            border: 1px solid var(--eac-border);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            min-height: 112px;
            transition: box-shadow 0.2s;
        }

        .stat-card:hover {
            box-shadow: 0 4px 14px rgba(122,16,34,0.1);
        }

        .stat-value {
            font-size: 1.85rem;
            font-weight: 700;
            color: var(--eac-maroon);
        }

        .stat-label {
            font-size: 0.82rem;
            color: #666;
            margin-top: 0.15rem;
        }
    </style>
</head>
<body class="homepage-page">

<div class="teacher-layout">
    <div th:replace="~{student-nav :: studentNav}"></div>

    <div class="teacher-content-wrapper">
        <div class="container profile-shell">
            <div class="profile-hero">
                <div class="d-flex align-items-center gap-3 flex-wrap">
                    <div class="profile-avatar">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <div>
                        <h2 class="mb-1 fw-bold" th:text="${currentUserFullName != null ? currentUserFullName : studentEmail}">Student Name</h2>
                        <p class="mb-2 opacity-75">
                            <i class="bi bi-envelope me-1"></i>
                            <span th:text="${currentUserEmail != null ? currentUserEmail : studentEmail}">student@email.com</span>
                        </p>
                        <span class="badge" style="background: rgba(212,175,55,0.9); color: #3a0a10; font-size:0.8rem;">
                            <i class="bi bi-mortarboard me-1"></i>Student
                        </span>
                    </div>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="stat-value" th:text="${totalAttempts}">0</div>
                        <div class="stat-label"><i class="bi bi-file-earmark-text me-1"></i>Exams Taken</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="stat-value" th:text="${avgScore + '%'}">0%</div>
                        <div class="stat-label"><i class="bi bi-bar-chart me-1"></i>Average Score</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="stat-value text-success" th:text="${passedCount}">0</div>
                        <div class="stat-label"><i class="bi bi-check-circle me-1"></i>Passed</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="stat-value" th:text="${bestScore + '%'}">0%</div>
                        <div class="stat-label"><i class="bi bi-trophy me-1"></i>Best Score</div>
                    </div>
                </div>
            </div>

            <div class="card upload-card">
                <div class="card-body p-4 text-center">
                    <form th:action="@{/logout}" method="post" class="d-inline-block">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-box-arrow-right me-1"></i> Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
