<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" th:href="@{/images/EAC_Emblem.png}" href="/images/EAC_Emblem.png">
    <link rel="shortcut icon" type="image/png" th:href="@{/images/EAC_Emblem.png}" href="/images/EAC_Emblem.png"><title th:text="'Processed Paper - ' + ${exam.examName}">Processed Paper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/teacher-processed-paper-detail.css}">
</head>
<body class="homepage-page processed-paper-detail-page">
<div class="teacher-layout">
    <div th:replace="~{teacher-nav :: teacherNav}"></div>

    <div class="teacher-content-wrapper">
        <div class="container-fluid paper-detail-shell">
            <div class="paper-detail-head">
                <div class="paper-detail-top">
                    <div class="paper-detail-copy">
                    <h4 class="paper-detail-title mb-0">
                        <i class="bi bi-file-earmark-check me-2"></i>
                        <span th:text="${exam.examName}">Exam Name</span>
                    </h4>
                    <p class="paper-detail-meta mb-0">
                        Subject: <strong th:text="${exam.subject}">Subject</strong>
                        &nbsp;&bull;&nbsp;
                        Activity: <strong th:text="${exam.activityType}">Exam</strong>
                        &nbsp;&bull;&nbsp;
                        Processed: <strong th:text="${exam.uploadedAt != null ? #temporals.format(exam.uploadedAt, 'MMM dd, yyyy hh:mm a') : '-'}">-</strong>
                    </p>
                </div>
                <div class="paper-actions-toolbar">
                    <div class="paper-actions-main">
                        <a th:href="@{/teacher/export-exam-with-answers/pdf(examId=${exam.examId})}" class="btn btn-sm btn-danger paper-action-btn">
                            <i class="bi bi-file-earmark-pdf me-1"></i> Download PDF
                        </a>
                        <a th:href="@{/teacher/export-exam-with-answers/csv(examId=${exam.examId})}" class="btn btn-sm btn-success paper-action-btn">
                            <i class="bi bi-filetype-csv me-1"></i> Download CSV
                        </a>
                        <a th:href="@{/teacher/export-exam-with-answers/docx(examId=${exam.examId})}" class="btn btn-sm btn-primary paper-action-btn">
                            <i class="bi bi-file-earmark-word me-1"></i> Download Word
                        </a>
                        <a th:href="@{/teacher/manage-questions/{examId}(examId=${exam.examId})}" class="btn btn-sm btn-outline-primary paper-action-btn">
                            <i class="bi bi-pencil-square me-1"></i> Manage Quiz
                        </a>
                        <form th:action="@{/teacher/processed-papers/{examId}/repair-questions(examId=${exam.examId})}" method="post"
                              onsubmit="return confirm('Repair malformed question rows for this paper?');">
                            <button type="submit" class="btn btn-sm btn-outline-warning paper-action-btn">
                                <i class="bi bi-wrench-adjustable-circle me-1"></i> Repair Questions
                            </button>
                        </form>
                    </div>
                    <a th:href="@{/teacher/processed-papers}" class="btn btn-sm btn-outline-secondary paper-action-btn paper-action-back">
                        <i class="bi bi-arrow-left me-1"></i> Back to Processed Papers
                    </a>
                </div>
                </div>

                <div class="paper-search-wrap">
                    <form method="get" class="paper-search-form">
                        <div class="input-group paper-search-group">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" name="questionSearch" class="form-control paper-search-input"
                                   placeholder="Search question text or answer key..." th:value="${questionSearch}">
                        </div>
                        <button type="submit" class="btn btn-primary paper-search-btn">
                            <i class="bi bi-search me-1"></i>Search
                        </button>
                    </form>
                </div>

            </div>

            <div th:if="${successMessage}" class="alert alert-success" role="alert">
                <i class="bi bi-check-circle me-1"></i><span th:text="${successMessage}">Success</span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${errorMessage}">Error</span>
            </div>

            <div class="results-card" th:if="${questionRows != null && !questionRows.isEmpty()}">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th style="width:70px;">#</th>
                            <th>Question</th>
                            <th style="width:280px;">Correct Answer</th>
                            <th style="width:140px;">Difficulty</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="row : ${questionRows}">
                            <td class="fw-bold" th:text="${row.number}">1</td>
                            <td th:text="${row.question}">Question text</td>
                            <td>
                                <div class="answer-key-text" th:text="${row.answer}" th:title="${row.answer}">Not Set</div>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${#strings.equalsIgnoreCase(row.difficulty, 'Easy') ? 'bg-success' : (#strings.equalsIgnoreCase(row.difficulty, 'Hard') ? 'bg-danger' : 'bg-warning text-dark')}"
                                      th:text="${row.difficulty}">Medium</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="results-card p-5 text-center text-muted" th:if="${questionRows == null || questionRows.isEmpty()}">
                <i class="bi bi-search display-5 d-block mb-2"></i>
                No questions or answers matched your search.
            </div>

            
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
