spring.application.name=algo


spring.datasource.url=jdbc:mysql://localhost:3306/adaptiveexam?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8&characterSetResults=utf8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci


spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true


spring.jpa.properties.hibernate.packagesToScan=com.exam.entity


server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.whitelabel.enabled=false

server.port=8080


spring.thymeleaf.cache=false

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=vincentjames.contento.mnl@eac.edu.ph
spring.mail.password=lmjf rdth exzd apnv
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=8000
spring.mail.properties.mail.smtp.writetimeout=8000
spring.mail.properties.mail.smtp.quitwait=false

app.base.url=http://localhost:8080

# Multipart upload limits for question media (image/video)
spring.servlet.multipart.max-file-size=550MB
spring.servlet.multipart.max-request-size=600MB
server.tomcat.max-swallow-size=-1

# Avoid JMX live-data connection errors in IDE process monitoring
spring.jmx.enabled=false

# Built-in Department Admin account (override in environment for production)
app.department-admin.email=department.admin@eac.local
app.department-admin.password=Admin123!
app.department-admin.full-name=Department Administrator
app.department-admin.department=Engineering and Technology
app.department-admin.program=BS Information Technology

# Persistent storage root for original uploaded files (exam and answer key)
app.storage.upload-root=uploads

# Automatic maintenance for long-term scalability.
app.maintenance.enabled=true
app.maintenance.interval-ms=21600000
app.maintenance.batch-size=200

# Keep minimal operational visibility in all environments.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# Retention policy archives old submissions to compressed jsonl files.
app.retention.enabled=true
app.retention.archive-after-days=365
app.retention.interval-ms=86400000
app.retention.batch-size=300
app.retention.delete-after-archive=false

