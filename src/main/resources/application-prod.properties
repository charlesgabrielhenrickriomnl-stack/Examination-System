# Production profile overrides for long-term stability.
spring.jpa.hibernate.ddl-auto=validate
spring.thymeleaf.cache=true
spring.jpa.open-in-view=false

# Keep SQL logging quiet in production.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Performance tuning.
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# Operational visibility.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# Maintenance settings for large datasets.
app.maintenance.enabled=true
app.maintenance.interval-ms=3600000
app.maintenance.batch-size=500

# Retention policy for submissions (archive first, then cleanup).
app.retention.enabled=true
app.retention.archive-after-days=540
app.retention.interval-ms=86400000
app.retention.batch-size=500
app.retention.delete-after-archive=true
